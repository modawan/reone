# Build reone `engine` for WebAssembly (Emscripten + SDL3 port).
# Artifacts are engine code + glsl preload only — no retail game files (KotOR.js parity).
name: Build WASM engine

on:
  workflow_dispatch:
  push:
    branches: [main, master, "cursor/**"]
    paths:
      - ".github/workflows/build-wasm.yml"
      - "CMakeLists.txt"
      - "src/**"
      - "include/**"
      - "glsl/**"
      - "tools/web/**"
      - "doc/webassembly.md"
  pull_request:
    paths:
      - ".github/workflows/build-wasm.yml"
      - "CMakeLists.txt"
      - "src/**"
      - "include/**"
      - "glsl/**"
      - "tools/web/**"
      - "doc/webassembly.md"

permissions:
  contents: read
  actions: write

# One run per branch; cancel superseded pushes so parallel queued jobs do not exhaust the pool.
concurrency:
  group: wasm-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wasm-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Module smoke (serve.py handler + Range)
        working-directory: tools/web
        run: python3 test_serve_smoke.py

      - name: Integration smoke (gen_game_manifest + live serve.py)
        run: |
          set -euo pipefail
          mkdir -p /tmp/web-empty /tmp/gr
          printf 'xy' > /tmp/gr/swkotor.exe
          python3 tools/web/gen_game_manifest.py /tmp/gr --strict
          python3 tools/web/serve.py --directory /tmp/web-empty --game-root /tmp/gr --port 28765 &
          pid=$!
          sleep 1
          curl -fsS "http://127.0.0.1:28765/game-manifest.json" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'swkotor.exe' in d['files'], d"
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "Range: bytes=0-0" "http://127.0.0.1:28765/game-files/swkotor.exe")
          test "$code" = "206"
          kill "$pid"

      - name: Install Ninja, ccache and Boost (headers only via copy step below)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache libboost-dev curl

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-emscripten-${{ hashFiles('CMakeLists.txt', 'src/apps/engine/CMakeLists.txt') }}
          restore-keys: |
            ccache-${{ runner.os }}-emscripten-

      - name: Isolate Boost headers for emcc
        run: |
          sudo mkdir -p /opt/reone/boost-include
          sudo cp -a /usr/include/boost /opt/reone/boost-include/

      - uses: emscripten-core/setup-emsdk@v15
        with:
          version: 5.0.7
          actions-cache-folder: ${{ github.workspace }}/.emsdk-cache

      - name: Build SDL3 cache (Emscripten ports)
        run: |
          set -euo pipefail
          embuilder build sdl3

      - name: Configure (Release, KotOR.js-parity asset profile)
        run: |
          set -euo pipefail
          emcmake cmake -G Ninja -S . -B build-web \
            -DCMAKE_BUILD_TYPE=Release \
            -DBoost_INCLUDE_DIR=/opt/reone/boost-include \
            -DBoost_NO_BOOST_CMAKE=ON

      - name: Build engine
        run: |
          set -euo pipefail
          cmake --build build-web --target engine -j "$(nproc)"

      - name: Verify wasm bundle (html, js, wasm, glsl data)
        run: python3 tools/web/verify_wasm_bundle.py build-web/bin

      - name: Smoke engine.html is served
        run: |
          set -euo pipefail
          python3 tools/web/serve.py --directory build-web/bin --port 28766 &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          sleep 1
          curl -fsS "http://127.0.0.1:28766/engine.html" | grep -qi '<html'

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reone-engine-wasm
          if-no-files-found: error
          path: |
            build-web/bin/engine.html
            build-web/bin/engine.js
            build-web/bin/engine.wasm
            build-web/bin/engine.data
